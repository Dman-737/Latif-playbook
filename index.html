<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latif's Playbook — ExpoGenie</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --purple:#6B3FA0;--purple-dark:#4A2570;--purple-light:#EDE6F7;
  --blue:#2563EB;--orange:#F97316;--red:#EF4444;--red-light:#FEE2E2;
  --green:#22C55E;--green-dark:#16A34A;--green-light:#F0FDF4;
  --gray-50:#F8F8FA;--gray-100:#F0EFF4;--gray-200:#E2E0EA;
  --gray-400:#9A97AA;--gray-600:#5C5870;--gray-900:#1A1625;
  --radius:14px;--radius-sm:8px;
  --shadow:0 2px 12px rgba(107,63,160,0.08);
  --shadow-lg:0 8px 32px rgba(107,63,160,0.14);
}
body{font-family:'DM Sans',sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh;padding:0 0 80px;}

/* ── Header ── */
.header{background:linear-gradient(135deg,var(--purple-dark) 0%,var(--purple) 60%,#8B5CF6 100%);padding:28px 40px 24px;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;top:-60px;right:-60px;width:260px;height:260px;background:rgba(255,255,255,0.06);border-radius:50%;}
.header::after{content:'';position:absolute;bottom:-40px;left:120px;width:160px;height:160px;background:rgba(249,115,22,0.15);border-radius:50%;}
.header-inner{max-width:820px;margin:0 auto;position:relative;z-index:1;}
.header-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.2);border-radius:100px;padding:4px 12px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,0.85);margin-bottom:14px;}
.header-badge span{color:var(--orange);}
.header h1{font-size:30px;font-weight:700;color:white;line-height:1.2;margin-bottom:8px;}
.header p{font-size:15px;color:rgba(255,255,255,0.65);}
.header-meta{display:flex;gap:24px;margin-top:22px;}
.header-stat{display:flex;flex-direction:column;gap:2px;}
.header-stat-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:white;}
.header-stat-label{font-size:11px;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:.06em;}
.header-divider{width:1px;background:rgba(255,255,255,0.2);align-self:stretch;}

/* ── Tabs ── */
.tabs-wrap{max-width:820px;margin:0 auto;padding:0 40px;}
.tabs{display:flex;gap:4px;background:var(--gray-100);border-radius:var(--radius);padding:4px;margin-top:28px;border:1px solid var(--gray-200);}
.tab{flex:1;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--gray-400);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'DM Sans',sans-serif;}
.tab.active{background:white;color:var(--purple);box-shadow:0 1px 6px rgba(107,63,160,.12);}
.tab-count{background:var(--purple-light);color:var(--purple);border-radius:100px;padding:1px 7px;font-size:11px;font-weight:700;font-family:'DM Mono',monospace;}
.tab.active .tab-count{background:var(--purple);color:white;}

/* ── Main ── */
.main{max-width:820px;margin:0 auto;padding:28px 40px 0;}
.section{display:none;}.section.active{display:block;}

/* ── Progress bar ── */
.global-progress{background:white;border:1px solid var(--gray-200);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;}
.progress-label{font-size:12px;font-weight:600;color:var(--gray-600);white-space:nowrap;}
.progress-bar-wrap{flex:1;height:6px;background:var(--gray-100);border-radius:100px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--blue));border-radius:100px;transition:width .4s ease;width:0%;}
.progress-pct{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--purple);white-space:nowrap;min-width:32px;text-align:right;}

/* ── Task cards ── */
.task-card{background:white;border:1px solid var(--gray-200);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;transition:box-shadow .2s,border-color .2s;}
.task-card:hover{box-shadow:var(--shadow);}
.task-card.open{border-color:var(--purple-light);box-shadow:var(--shadow-lg);}
.task-card.complete .task-num{background:linear-gradient(135deg,var(--green),var(--green-dark));}

.task-header{display:flex;align-items:center;gap:16px;padding:18px 20px;cursor:pointer;user-select:none;}
.task-num{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:white;background:var(--purple);border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.task-info{flex:1;min-width:0;}
.task-title{font-size:15px;font-weight:600;color:var(--gray-900);margin-bottom:3px;border-radius:4px;padding:1px 4px;border:1.5px solid transparent;outline:none;display:block;width:100%;}
.task-title.editing{border-color:var(--purple);background:white;box-shadow:0 0 0 3px rgba(107,63,160,0.1);cursor:text;}
.task-desc-short{font-size:12px;color:var(--gray-400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-radius:4px;padding:1px 4px;border:1.5px solid transparent;outline:none;display:block;width:100%;}
.task-desc-short.editing{border-color:rgba(107,63,160,0.4);background:white;box-shadow:0 0 0 3px rgba(107,63,160,0.08);white-space:normal;overflow:visible;text-overflow:unset;color:var(--gray-600);cursor:text;}
.task-edit-pencil{opacity:0;width:24px;height:24px;border:none;background:transparent;cursor:pointer;border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--gray-400);transition:all .15s;flex-shrink:0;}
.task-card:hover .task-edit-pencil{opacity:1;}
.task-edit-pencil:hover{background:var(--purple-light);color:var(--purple);}
.task-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}

/* Ring */
.task-progress-ring{position:relative;width:36px;height:36px;}
.task-progress-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--gray-100);stroke-width:3;}
.ring-fill{fill:none;stroke:var(--purple);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .4s ease;}
.ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:9px;font-weight:500;color:var(--purple);}
.task-card.complete .ring-fill{stroke:var(--green);}
.task-card.complete .ring-text{color:var(--green);}
.chevron{width:18px;height:18px;color:var(--gray-400);transition:transform .25s;flex-shrink:0;}
.task-card.open .chevron{transform:rotate(180deg);}

/* Delete task button */
.delete-task-btn{opacity:0;width:28px;height:28px;border:none;background:transparent;color:var(--gray-400);cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.task-card:hover .delete-task-btn{opacity:1;}
.delete-task-btn:hover{background:var(--red-light);color:var(--red);}

/* Inline delete confirm */
.delete-confirm{display:none;position:absolute;right:16px;top:50%;transform:translateY(-50%);background:white;border:1px solid var(--gray-200);border-radius:10px;padding:8px 12px;box-shadow:var(--shadow-lg);z-index:10;align-items:center;gap:10px;white-space:nowrap;}
.delete-confirm.visible{display:flex;}
.delete-confirm span{font-size:12px;color:var(--gray-600);font-weight:500;}
.confirm-yes{padding:5px 12px;border-radius:6px;border:none;background:var(--red);color:white;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.confirm-yes:hover{background:#DC2626;}
.confirm-no{padding:5px 10px;border-radius:6px;border:1px solid var(--gray-200);background:white;color:var(--gray-600);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;}
.confirm-no:hover{border-color:var(--gray-400);}
.task-header-wrap{position:relative;}

/* Body */
.task-body{display:none;padding:0 20px 20px;border-top:1px solid var(--gray-100);}
.task-card.open .task-body{display:block;}
.task-summary{font-size:13.5px;color:var(--gray-600);line-height:1.65;padding:14px 0 16px;border-bottom:1px dashed var(--gray-200);margin-bottom:18px;border:1.5px solid transparent;border-radius:6px;padding-left:6px;padding-right:6px;cursor:text;transition:border-color .15s,background .15s;outline:none;word-break:break-word;}
.task-summary:hover{background:rgba(107,63,160,0.03);}
.task-summary:focus,.task-summary.editing{border-color:var(--purple);background:white;box-shadow:0 0 0 3px rgba(107,63,160,0.1);color:var(--gray-900);}
.summary-hint{font-size:10px;color:var(--purple);font-style:italic;opacity:.7;margin-bottom:12px;display:none;}
.task-summary:focus~.summary-hint,.task-summary.editing~.summary-hint{display:block;}
.steps-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-400);margin-bottom:12px;}

/* Steps */
.step-item{display:flex;align-items:flex-start;gap:12px;padding:8px 10px;border-radius:var(--radius-sm);margin-bottom:4px;}
.step-item:hover{background:rgba(107,63,160,0.03);}
.step-item.checked{background:var(--green-light);}
.step-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--gray-200);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .2s;background:white;cursor:pointer;}
.step-item.checked .step-check{background:var(--green);border-color:var(--green);}
.step-check svg{display:none;}
.step-item.checked .step-check svg{display:block;}
.step-num{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:var(--gray-400);min-width:18px;margin-top:4px;flex-shrink:0;}
.step-content{flex:1;display:flex;align-items:flex-start;gap:4px;min-width:0;}
.step-text{font-size:13.5px;color:var(--gray-600);line-height:1.55;flex:1;padding:2px 6px;border-radius:5px;cursor:text;border:1.5px solid transparent;transition:border-color .15s,background .15s;outline:none;word-break:break-word;}
.step-item.checked .step-text{color:#86EFAC;text-decoration:line-through;text-decoration-color:#86EFAC;}
.step-text:hover{background:rgba(107,63,160,0.04);}
.step-text:focus,.step-text.editing{border-color:var(--purple);background:white;box-shadow:0 0 0 3px rgba(107,63,160,0.1);color:var(--gray-900);text-decoration:none;cursor:text;}

.header-date{font-family:'DM Mono',monospace;font-size:12px;color:rgba(255,255,255,0.5);margin-top:6px;letter-spacing:0.04em;}

/* Due date (projects only) */
.due-date-wrap{display:flex;align-items:center;gap:5px;margin-top:5px;}
.due-date-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);white-space:nowrap;}
.due-date-input{font-family:'DM Mono',monospace;font-size:11px;color:var(--gray-600);border:1.5px solid var(--gray-200);border-radius:6px;padding:3px 8px;outline:none;background:white;cursor:pointer;transition:border-color .15s;}
.due-date-input:hover{border-color:var(--purple-light);}
.due-date-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(107,63,160,0.1);}
.due-date-input.overdue{color:#EF4444;border-color:#FECACA;}
.due-date-input.soon{color:var(--orange);border-color:#FED7AA;}

/* Card drag handle */
.card-drag-handle{width:24px;height:36px;display:flex;align-items:center;justify-content:center;cursor:grab;color:var(--gray-300,#D1D5DB);flex-shrink:0;opacity:0;transition:opacity .15s;user-select:none;-webkit-user-select:none;}
.task-card:hover .card-drag-handle{opacity:1;}
.card-drag-handle:hover{color:var(--gray-400);}
.card-drag-handle:active{cursor:grabbing;}
.card-drag-handle svg{pointer-events:none;}
.task-card.card-dragging{opacity:0.3;border:1.5px dashed var(--purple);}
.task-card.card-drag-over-top{border-top:3px solid var(--purple);}
.task-card.card-drag-over-bottom{border-bottom:3px solid var(--purple);}

/* Reset task button (Freshdesk only) */
.reset-task-btn{margin-top:14px;padding:7px 14px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);background:white;color:var(--gray-400);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
.reset-task-btn:hover{border-color:var(--orange);color:var(--orange);}

/* Rich text toolbar */
.rt-toolbar{display:none;position:absolute;z-index:100;background:var(--gray-900);border-radius:8px;padding:4px 6px;gap:2px;align-items:center;box-shadow:0 4px 16px rgba(0,0,0,0.25);white-space:nowrap;}
.rt-toolbar.visible{display:flex;}
.rt-btn{width:26px;height:26px;border:none;background:transparent;color:rgba(255,255,255,0.75);cursor:pointer;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;transition:all .15s;}
.rt-btn:hover{background:rgba(255,255,255,0.15);color:white;}
.rt-btn.active{background:rgba(255,255,255,0.2);color:white;}
.rt-divider{width:1px;height:16px;background:rgba(255,255,255,0.2);margin:0 2px;}
.rt-link-input-wrap{display:none;align-items:center;gap:6px;}
.rt-link-input-wrap.visible{display:flex;}
.rt-link-input{border:none;outline:none;background:rgba(255,255,255,0.1);color:white;font-family:'DM Mono',monospace;font-size:11px;padding:4px 8px;border-radius:5px;width:180px;}
.rt-link-input::placeholder{color:rgba(255,255,255,0.35);}
.rt-link-apply{padding:4px 10px;border-radius:5px;border:none;background:var(--purple);color:white;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;}
.rt-link-apply:hover{background:var(--purple-dark);}
.rt-link-cancel{padding:4px 8px;border-radius:5px;border:none;background:transparent;color:rgba(255,255,255,0.6);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;}
/* Links inside summaries */
.task-summary a{color:var(--purple);text-decoration:underline;text-decoration-color:rgba(107,63,160,0.4);}
.task-summary a:hover{text-decoration-color:var(--purple);}

/* Rich text toolbar */
.card-progress-wrap{padding:0 20px 14px;display:flex;align-items:center;gap:12px;}
.card-progress-bar-track{flex:1;height:5px;background:var(--gray-100);border-radius:100px;overflow:hidden;}
.card-progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--blue));border-radius:100px;transition:width .4s ease;width:0%;}
.card-progress-label{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:var(--purple);white-space:nowrap;min-width:28px;text-align:right;}

/* Drag handle */
.drag-handle{width:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:grab;color:var(--gray-200);margin-top:3px;opacity:0;transition:opacity .15s;}
.step-item:hover .drag-handle{opacity:1;}
.drag-handle:active{cursor:grabbing;}
.drag-handle svg{pointer-events:none;}
.step-item.dragging{opacity:0.35;background:var(--purple-light)!important;}
.step-item.drag-over-top{border-top:2px solid var(--purple);margin-top:-2px;}
.step-item.drag-over-bottom{border-bottom:2px solid var(--purple);}

/* Step action buttons */
.step-actions{display:flex;align-items:center;gap:2px;opacity:0;transition:opacity .15s;flex-shrink:0;margin-top:1px;}
.step-item:hover .step-actions{opacity:1;}
.step-action-btn{width:22px;height:22px;border:none;background:transparent;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--gray-400);}
.step-action-btn.edit:hover{background:var(--purple-light);color:var(--purple);}
.step-action-btn.delete:hover{background:var(--red-light);color:var(--red);}

/* Add step button */
.add-step-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--gray-400);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;margin-top:4px;width:100%;}
.add-step-btn:hover{background:rgba(107,63,160,0.06);color:var(--purple);}

/* Editing tip */
.editing-tip{font-size:11px;color:var(--purple);margin-top:6px;margin-left:50px;font-style:italic;display:none;opacity:.75;}
.editing-tip.visible{display:block;}

/* Add task button */
.add-task-btn{width:100%;padding:13px;border:1.5px dashed var(--gray-200);border-radius:var(--radius);background:transparent;color:var(--gray-400);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;}
.add-task-btn:hover{border-color:var(--purple);color:var(--purple);background:var(--purple-light);}

/* Utilities */
.reset-all-wrap{text-align:right;margin-bottom:12px;}
.reset-all-btn{border:none;background:none;color:var(--gray-400);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:color .15s;}
.reset-all-btn:hover{color:var(--orange);}
.footer-note{text-align:center;font-size:11px;color:var(--gray-400);margin-top:40px;font-style:italic;}

/* ── Notes Drawer ── */
.notes-fab{position:fixed;bottom:28px;right:28px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--blue));border:none;cursor:pointer;box-shadow:0 4px 20px rgba(107,63,160,0.4);display:flex;align-items:center;justify-content:center;z-index:200;transition:transform .2s,box-shadow .2s;}
.notes-fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(107,63,160,0.5);}
.notes-fab svg{pointer-events:none;}
.reset-defaults-btn{position:fixed;bottom:92px;right:28px;background:white;border:1px solid var(--gray-200);border-radius:8px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--gray-400);cursor:pointer;box-shadow:var(--shadow);transition:all .15s;z-index:199;white-space:nowrap;}
.reset-defaults-btn:hover{border-color:var(--orange);color:var(--orange);}
.notes-badge{position:absolute;top:-4px;right:-4px;background:var(--orange);color:white;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;display:none;}
.notes-badge.visible{display:flex;}

.notes-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.25);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s;}
.notes-overlay.open{opacity:1;pointer-events:all;}

.notes-drawer{position:fixed;top:0;right:0;bottom:0;width:360px;background:white;z-index:301;display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,0.15);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
.notes-drawer.open{transform:translateX(0);}

.notes-header{padding:20px 20px 16px;border-bottom:1px solid var(--gray-100);flex-shrink:0;}
.notes-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.notes-title{font-size:16px;font-weight:700;color:var(--gray-900);}
.notes-close{width:30px;height:30px;border:none;background:transparent;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--gray-400);transition:all .15s;}
.notes-close:hover{background:var(--gray-100);color:var(--gray-900);}

.author-toggle{display:flex;background:var(--gray-100);border-radius:8px;padding:3px;gap:3px;}
.author-btn{flex:1;padding:6px 12px;border-radius:6px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;color:var(--gray-400);transition:all .2s;}
.author-btn.active{background:white;box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.author-btn.derek.active{color:var(--purple);}
.author-btn.latif.active{color:var(--blue);}

.notes-feed{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.notes-feed::-webkit-scrollbar{width:4px;}
.notes-feed::-webkit-scrollbar-track{background:transparent;}
.notes-feed::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:4px;}

.note-item{display:flex;flex-direction:column;gap:4px;}
.note-meta{display:flex;align-items:center;gap:8px;}
.note-author{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;}
.note-author.derek{color:var(--purple);}
.note-author.latif{color:var(--blue);}
.note-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--gray-400);}
.note-delete{width:18px;height:18px;border:none;background:transparent;cursor:pointer;border-radius:3px;color:var(--gray-200);display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s;margin-left:auto;}
.note-item:hover .note-delete{opacity:1;}
.note-delete:hover{background:var(--red-light);color:var(--red);}
.note-bubble{background:var(--gray-50);border:1px solid var(--gray-100);border-radius:0 10px 10px 10px;padding:10px 12px;font-size:13.5px;color:var(--gray-700,#374151);line-height:1.55;word-break:break-word;}

": "Full event configuration for clients", "summary": "Handle hands-on configuration of client events within ExpoGenie — floor plans, exhibitor profiles, sponsors, registration, and custom settings — executed accurately and on schedule.", "steps": ["Review the client’s event brief or requirements doc in full before touching anything in the platform.", "Open or create the event in ExpoGenie.", "Configure the floor plan or booth layout per the client’s map or spec.", "Build out exhibitor profiles — import via CSV if available, otherwise enter manually.", "Set up sponsor profiles and assign to correct tier (Gold, Silver, etc.).", "Configure registration settings: fields, confirmation email, and any custom questions.", "Apply any custom fields or feature configurations specific to this client’s event.", "Test the full exhibitor and attendee workflow end-to-end (register, log in, view floor plan, scan lead).", "Review the build visually — check for missing logos, broken links, or formatting issues.", "Notify Derek and the client when the build is complete and ready to review."], "num": 2}, {"id": "call-followup", "title": "Onboarding Call Follow Up", "short": "Same-day recap email after every call", "summary": "After each onboarding or training call, send a follow-up to the client summarizing what was covered, action items on their end, and next steps — within 24 hours.", "steps": ["Immediately after the call, jot down the key topics discussed before you forget.", "Note all action items — separate into: what the client needs to do vs. what ExpoGenie will do.", "Draft the follow-up email: open with a brief summary sentence, then list client action items with deadlines, then list ExpoGenie next steps.", "Confirm the next call or check-in date and include it in the email.", "CC Derek if the call touched on anything outside standard onboarding, or if Derek was on the call.", "Send the email within 24 hours of the call — same day is preferred.", "Log the follow-up as a note in Freshdesk against the client’s ticket or record."], "num": 3}, {"id": "training", "title": "Basic Training Sessions", "short": "Platform walkthroughs for new clients", "summary": "Conduct introductory training calls with new clients covering core ExpoGenie workflows — keeping sessions efficient, structured, and client-friendly.", "steps": ["Confirm the session date, time, and video link with the client at least 24 hours in advance.", "Review the client’s event build before the session so your examples are specific to their event.", "Prepare your screen share — open ExpoGenie with the client’s event already loaded.", "Cover the core modules in order: Admin Dashboard overview, Exhibitor management, Sponsor management, Registration, Lead Scanning basics.", "Pause after each module for questions before moving on.", "If a question comes up you can’t answer confidently, say ‘Let me confirm that with Derek and follow up’ — don’t guess.", "Keep sessions to the agreed time. Don’t overload the client in one sitting.", "After the call, send a follow-up email (see Task 4) summarizing what was covered and any open questions."], "num": 4}, {"id": "feature-testing", "title": "New Release Feature Testing", "short": "QA new features before clients see them", "summary": "When the dev team ships updates, test from the client’s perspective — document bugs clearly, and sign off before release.", "steps": ["Receive release notes or a feature description from the dev team (e2e).", "Read the notes fully — understand what the feature is supposed to do before testing.", "Create a simple test checklist: list 5-10 specific things to verify for this feature.", "Test in the staging or sandbox environment — never on a live client event.", "Go through your checklist one item at a time. Note: Pass, Fail, or Unexpected Behavior.", "For any failure: take a screenshot, write out the exact steps to reproduce it, and note what you expected vs. what happened.", "Submit your bug report to the dev team with screenshots attached — be specific, not vague.", "After fixes are deployed, re-test the failed items to confirm they’re resolved.", "Give final sign-off to Derek when everything passes. Do not sign off if open bugs remain."], "num": 5}, {"id": "lead-scanning", "title": "Lead Scanning Support", "short": "Real-time exhibitor support during live events", "summary": "Support exhibitors using ExpoGenie’s lead scanning during live events — from pre-event setup to real-time troubleshooting on the show floor.", "steps": ["Pre-event (day before): confirm all exhibitors who need lead scanning have received their login credentials.", "Test the lead scanning function yourself on the event to confirm it’s working before the show opens.", "Check that exhibitor profiles are complete — incomplete profiles cause scanning issues.", "On the day of the event: be available and responsive during show hours (have notifications on).", "When an exhibitor reports an issue: first confirm they’re logged into the correct account, then walk them through the scanning steps.", "If it’s a technical bug (not user error), document the issue and contact Derek or dev team immediately — time is critical during live events.", "Post-event: if any exhibitor needs help exporting their lead data, walk them through the export process or run it for them.", "Log any issues encountered so recurring problems can be addressed in a future release."], "num": 6}], "projects": [{"id": "knowledgebase", "title": "Knowledgebase (and continued maintenance)", "short": "Self-service help library for ExpoGenie clients", "summary": "Build ExpoGenie’s self-service knowledgebase in Freshdesk — starting with the highest-traffic topics, written in plain language. Maintain it continuously as the product evolves.", "steps": ["Pull the last 60 days of Freshdesk tickets and group them by topic — the most frequent questions become your first articles.", "Create a category structure in Freshdesk’s Help Center (e.g., Getting Started, Exhibitor Management, Lead Scanning, Billing).", "Start writing articles for the top 10 most common questions — aim for plain, step-by-step language a non-technical user can follow.", "Add screenshots for every key step — visual guides cut support tickets significantly.", "Share each article draft with Derek for review before publishing.", "Publish articles to the Freshdesk Help Center once approved.", "With each new product release, identify what’s changed and update or create the relevant articles within one week of launch.", "Retire or archive any articles that are no longer accurate — outdated help content is worse than no help content.", "Monthly: review article views and search terms in Freshdesk to identify gaps and prioritize new content."], "num": 1}, {"id": "ai-chatbot", "title": "FreshDesk AI Chatbot", "short": "AI-powered first-response bot for client support", "summary": "Configure and launch a Freshdesk AI chatbot trained on the ExpoGenie knowledgebase. Goal: deflect routine tickets and give clients instant answers — especially outside business hours.", "steps": ["Ensure the knowledgebase has at least 15-20 solid articles published before configuring the chatbot — the bot is only as good as its source material.", "Navigate to Freshdesk’s Freddy AI or Chatbot setup section and begin a new bot configuration.", "Connect the chatbot to the ExpoGenie Help Center knowledgebase as its primary knowledge source.", "Write the bot’s greeting message — keep it friendly, on-brand, and clear that it’s an AI assistant.", "Configure fallback rules: if the bot can’t answer confidently, it should offer to create a ticket or connect to a human agent.", "Set up the chatbot widget on the ExpoGenie support page or within the platform (coordinate with Derek on placement).", "Run 20+ test questions covering common client scenarios — document where the bot succeeds and where it fails.", "Refine bot responses and fill knowledgebase gaps based on test results.", "Go live and monitor for the first two weeks — review bot transcripts daily and make adjustments.", "Report weekly to Derek on: deflection rate, unanswered questions, and any recurring themes."], "num": 2}, {"id": "ai-ops", "title": "AI Operations", "short": "Identify and implement AI tools across ExpoGenie ops", "summary": "Find, test, and manage AI-driven tools and workflows that reduce manual workload across support and operations. Latif owns implementation and quality control — working closely with Derek to prioritize.", "steps": ["Schedule a scoping session with Derek to identify the top 5 most time-consuming repetitive tasks across support and operations.", "For each task, document: what the task is, how long it takes, how often it happens, and what a good AI output would look like.", "Research existing AI tools or features (within Freshdesk, or standalone) that could automate or assist with each task.", "Present findings to Derek as a simple comparison — tool name, what it does, estimated time saved, cost if any.", "Begin with the highest-impact, lowest-risk task first. Don’t try to automate everything at once.", "Run a two-week pilot of the selected tool — track time saved and quality of output.", "Document the new AI-assisted workflow so anyone on the team can follow it.", "Review all active AI tools monthly with Derek — cut what isn’t working, expand what is.", "Stay current on new AI capabilities relevant to ExpoGenie’s workflows and bring recommendations to Derek proactively."], "num": 3}]};

/* ── Persistence ── */
// Stable key — never changes
var STORAGE_KEY = 'expogenie_latif_playbook';

// JSONBin cloud sync
var BIN_ID  = '69e680ac856a68218954d74e';
var BIN_KEY = '$2a$10$0yTgm6Y9WMD0FUgWxa7dyu/PtGyaeuZd37yKPCjAwF6EDSrOlIWXa';
var BIN_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

function saveData(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  // Push to cloud silently
  fetch(BIN_URL, {
    method: 'PUT',
    headers: {'Content-Type':'application/json','X-Master-Key':BIN_KEY},
    body: JSON.stringify({playbook: data})
  }).catch(function(){});
}

function loadData(){
  // Return local cache immediately for snappy load, then sync from cloud
  var cached = null;
  try {
    var s = localStorage.getItem(STORAGE_KEY);
    if(s){
      cached = JSON.parse(s);
      ['freshdesk','ongoing','projects'].forEach(function(k){
        if(!cached[k]) cached[k] = JSON.parse(JSON.stringify(DEFAULTS[k]||[]));
      });
    }
  } catch(e){}

  if(!cached){
    cached = JSON.parse(JSON.stringify(DEFAULTS));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cached));
  }

  // Fetch from cloud and update if newer
  fetch(BIN_URL + '/latest', {
    headers: {'X-Master-Key': BIN_KEY}
  }).then(function(r){ return r.json(); })
  .then(function(d){
    if(d && d.record && d.record.playbook){
      var cloud = d.record.playbook;
      ['freshdesk','ongoing','projects'].forEach(function(k){
        if(!cloud[k]) cloud[k] = JSON.parse(JSON.stringify(DEFAULTS[k]||[]));
      });
      // Only update if cloud differs from local
      if(JSON.stringify(cloud) !== JSON.stringify(data)){
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cloud));
        // Update data and re-render
        ['freshdesk','ongoing','projects'].forEach(function(k){
          data[k] = cloud[k];
        });
        renumber('freshdesk');renumber('ongoing');renumber('projects');
        renderCards('freshdesk');renderCards('ongoing');renderCards('projects');
      }
    }
  }).catch(function(){});

  return cached;
}

function renumber(sec){data[sec].forEach(function(t,i){t.num=i+1;});}

var data=loadData();
renumber('freshdesk');renumber('ongoing');renumber('projects');

/* ── Checkbox helpers ── */
function ckKey(s,id,i){return'eg_ck_'+s+'_'+id+'_'+i;}
function isChk(s,id,i){return localStorage.getItem(ckKey(s,id,i))==='1';}
function setChk(s,id,i,v){v?localStorage.setItem(ckKey(s,id,i),'1'):localStorage.removeItem(ckKey(s,id,i));}

/* ── HTML escape ── */
function esc(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── Render ── */

      '</div>':'';

    var stepsHtml=task.steps.map(function(step,i){

        '</div>'+
        '<div class="step-check" onclick="toggleStep(\''+sec+'\',\''+task.id+'\','+i+')">'+

            '</button>'+
            '<button class="step-action-btn delete" title="Delete step" onclick="deleteStep(\''+sec+'\',\''+task.id+'\','+i+')">'+
              '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>'+
            '</button>'+
          '</div>'+
        '</div>'+
      '</div>';
    }).join('');

    el.innerHTML=
      '<div class="task-header-wrap">'+
        '<div class="task-header" onclick="toggleCard(\''+sec+'\',\''+task.id+'\')">'+
          '<div class="card-drag-handle" data-drag-handle="true" title="Drag to reorder">'+
            '<svg width="10" height="16" viewBox="0 0 10 16" fill="currentColor"><circle cx="2.5" cy="2" r="1.5"/><circle cx="7.5" cy="2" r="1.5"/><circle cx="2.5" cy="6.5" r="1.5"/><circle cx="7.5" cy="6.5" r="1.5"/><circle cx="2.5" cy="11" r="1.5"/><circle cx="7.5" cy="11" r="1.5"/><circle cx="2.5" cy="15.5" r="1.5"/><circle cx="7.5" cy="15.5" r="1.5"/></svg>'+

          '<div class="task-num">'+task.num+'</div>'+
          '<div class="task-info">'+

            (sec==='projects'?

                '<input type="date" class="due-date-input" id="dd-'+sec+'-'+task.id+'" value="'+(task.dueDate||'')+'" onchange="saveDueDate(\''+sec+'\',\''+task.id+'\',this)" onclick="event.stopPropagation()" onmousedown="event.stopPropagation()">'+

                '<div class="ring-text">'+pct+'%</div>'+
              '</div>':'')+
            '<button class="delete-task-btn" title="Delete task" onclick="showDeleteConfirm(event,\''+sec+'\',\''+task.id+'\')">'+
              '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>'+
            '</button>'+
            '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>'+
          '</div>'+
        '</div>'+
        '<div class="delete-confirm" id="dc-'+sec+'-'+task.id+'">'+
          '<span>Delete this task?</span>'+
          '<button class="confirm-yes" onclick="deleteTask(\''+sec+'\',\''+task.id+'\')">Delete</button>'+
          '<button class="confirm-no" onclick="hideDeleteConfirm(\''+sec+'\',\''+task.id+'\')">Cancel</button>'+
        '</div>'+
      '</div>'+
      cardProgressHtml+
      '<div class="task-body">'+
        '<div class="task-summary" contenteditable="true" data-sec="'+sec+'" data-tid="'+task.id+'" onclick="event.stopPropagation()" onfocus="rtAttach(this)" onblur="commitSummary(this)" onkeydown="handleSummaryKey(event,this)">'+task.summary+'</div>'+
        '<div class="summary-hint">Press Enter or click away to save.</div>'+
        '<div class="steps-label">Step-by-step checklist</div>'+
        '<div class="steps-list" id="sl-'+sec+'-'+task.id+'">'+stepsHtml+'</div>'+
        '<div class="editing-tip" id="tip-'+sec+'-'+task.id+'">Press Enter or click away to save.</div>'+
        '<button class="add-step-btn" onclick="addStep(\''+sec+'\',\''+task.id+'\')">'+
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'+
          'Add Step'+
        '</button>'+
      '</div>';
    c.appendChild(el);
    var sl=el.querySelector('.steps-list');
    if(sl)initDrag(sl,sec,task.id);
  });
  updateProgress(sec);
  updateCounts();
  initCardDrag(c,sec);
  if(sec==='projects')setTimeout(applyAllDueDates,0);
}

/* ── Delete task (inline confirm) ── */
function showDeleteConfirm(e,sec,tid){
  e.stopPropagation();
  hideAllConfirms();
  var dc=document.getElementById('dc-'+sec+'-'+tid);
  if(dc)dc.classList.add('visible');
  document.addEventListener('click',hideAllConfirms,{once:true,capture:true});
}
function hideDeleteConfirm(sec,tid){
  var dc=document.getElementById('dc-'+sec+'-'+tid);
  if(dc)dc.classList.remove('visible');
}
function hideAllConfirms(){
  document.querySelectorAll('.delete-confirm.visible').forEach(function(d){d.classList.remove('visible');});
}
function deleteTask(sec,tid){
  data[sec]=data[sec].filter(function(t){return t.id!==tid;});
  renumber(sec);saveData();renderCards(sec);
}

/* ── Add / delete steps ── */
function addStep(sec,tid){
  var task=data[sec].find(function(t){return t.id===tid;});
  if(!task)return;
  task.steps.push('New step — click to edit.');
  saveData();
  renderCards(sec);
  setTimeout(function(){
    var card=document.getElementById('card-'+sec+'-'+tid);
    if(card)card.classList.add('open');
    // Auto-focus the new step
    var sl=document.getElementById('sl-'+sec+'-'+tid);
    if(sl){
      var items=sl.querySelectorAll('.step-text');
      var last=items[items.length-1];
      if(last)startEdit(last);
    }
  },20);
}
function deleteStep(sec,tid,idx){
  var task=data[sec].find(function(t){return t.id===tid;});
  if(!task||task.steps.length<=1)return; // keep at least 1 step
  // clear checkbox for this step and shift remaining
  for(var j=idx;j<task.steps.length-1;j++){
    var v=isChk(sec,tid,j+1);
    setChk(sec,tid,j,v);
  }
  localStorage.removeItem(ckKey(sec,tid,task.steps.length-1));
  task.steps.splice(idx,1);
  saveData();
  renderCards(sec);
  setTimeout(function(){
    var card=document.getElementById('card-'+sec+'-'+tid);
    if(card)card.classList.add('open');
  },10);
}

/* ── Add task ── */
function addTask(sec){
  var newId='t'+Date.now();
  data[sec].push({id:newId,num:data[sec].length+1,title:'New Task',short:'Click steps to edit',summary:'Add a description for this task.',steps:['Add your first step here.']});
  renumber(sec);saveData();renderCards(sec);
  setTimeout(function(){
    var card=document.getElementById('card-'+sec+'-'+newId);
    if(card)card.classList.add('open');
  },20);
}

/* ── Inline step editing ── */
function startEdit(el){
  if(el.getAttribute('contenteditable')==='true')return;
  el.setAttribute('contenteditable','true');
  el.classList.add('editing');
  el.focus();
  var r=document.createRange();r.selectNodeContents(el);r.collapse(false);
  window.getSelection().removeAllRanges();window.getSelection().addRange(r);
  var tip=document.getElementById('tip-'+el.dataset.sec+'-'+el.dataset.tid);
  if(tip)tip.classList.add('visible');
}
function commitEdit(el){
  el.setAttribute('contenteditable','false');
  el.classList.remove('editing');
  // Clear any lingering text selection the browser leaves after editing
  if(window.getSelection)window.getSelection().removeAllRanges();
  var sec=el.dataset.sec,tid=el.dataset.tid,i=parseInt(el.dataset.idx);
  var text=el.textContent.trim()||'Step text';
  var task=data[sec].find(function(t){return t.id===tid;});
  if(task){task.steps[i]=text;saveData();}
  var tip=document.getElementById('tip-'+sec+'-'+tid);
  if(tip)tip.classList.remove('visible');
}
function handleKey(e,el){
  if(e.key==='Enter'){e.preventDefault();el.blur();}
  if(e.key==='Escape'){
    var task=data[el.dataset.sec].find(function(t){return t.id===el.dataset.tid;});
    if(task)el.textContent=task.steps[parseInt(el.dataset.idx)];
    el.blur();
  }
}

/* ── Toggle card ── */
function toggleCard(sec,tid){
  var card=document.getElementById('card-'+sec+'-'+tid);
  var was=card.classList.contains('open');
  document.querySelectorAll('.task-card.open').forEach(function(c){c.classList.remove('open');});
  hideAllConfirms();
  if(!was)card.classList.add('open');
}

// Prevent card drag handle click from collapsing card
document.addEventListener('click',function(e){
  if(e.target.closest('[data-drag-handle]'))e.stopImmediatePropagation();
},true);

/* ── Toggle step checkbox ── */
function toggleStep(sec,tid,i){
  var val=!isChk(sec,tid,i);setChk(sec,tid,i,val);
  var item=document.getElementById('si-'+sec+'-'+tid+'-'+i);
  if(item)item.classList.toggle('checked',val);
  var task=data[sec].find(function(t){return t.id===tid;});
  var card=document.getElementById('card-'+sec+'-'+tid);
  var cnt=task.steps.filter(function(_,j){return isChk(sec,tid,j);}).length;
  card.classList.toggle('complete',cnt===task.steps.length&&task.steps.length>0);
  updateRing(sec,tid);updateProgress(sec);
}
function updateRing(sec,tid){
  var task=data[sec].find(function(t){return t.id===tid;});
  var cnt=task.steps.filter(function(_,i){return isChk(sec,task.id,i);}).length;
  var pct=task.steps.length?Math.round(cnt/task.steps.length*100):0;
  var circ=2*Math.PI*15;
  var card=document.getElementById('card-'+sec+'-'+tid);if(!card)return;
  var f=card.querySelector('.ring-fill');if(f)f.setAttribute('stroke-dashoffset',circ-(pct/100)*circ);
  var rt=card.querySelector('.ring-text');if(rt)rt.textContent=pct+'%';
  // Per-card bar (projects only)
  var cpb=document.getElementById('cpb-'+sec+'-'+tid);
  var cpl=document.getElementById('cpl-'+sec+'-'+tid);
  if(cpb)cpb.style.width=pct+'%';
  if(cpl)cpl.textContent=pct+'%';
}

/* ── Progress ── */
function resetSection(sec){
  data[sec].forEach(function(t){t.steps.forEach(function(_,i){setChk(sec,t.id,i,false);});});
  renderCards(sec);
}
function updateProgress(sec){
  if(sec==='ongoing'||sec==='projects')return;
  var tot=0,done=0;
  data[sec].forEach(function(t){
    tot+=t.steps.length;
    t.steps.forEach(function(_,i){if(isChk(sec,t.id,i))done++;});
  });
  var pct=tot?Math.round(done/tot*100):0;
  document.getElementById(sec+'-bar').style.width=pct+'%';
  document.getElementById(sec+'-pct').textContent=pct+'%';
}
function updateCounts(){
  ['freshdesk','ongoing','projects'].forEach(function(s){
    var tc=document.getElementById('tc-'+s);
    if(tc)tc.textContent=data[s].length;
  });
}

/* ── Drag & drop step reordering ── */
var dragState={sec:null,tid:null,fromIdx:null,overEl:null};

function initDrag(container,sec,tid){
  container.querySelectorAll('.step-item').forEach(function(item){
    var handle=item.querySelector('.drag-handle');
    if(!handle)return;

    handle.addEventListener('mousedown',function(e){
      e.preventDefault(); // block text selection during drag
      var fromIdx=parseInt(item.dataset.idx);
      var isDragging=false;
      var overEl=null;
      var overTop=false;

      function clearOver(){
        if(overEl){overEl.classList.remove('drag-over-top','drag-over-bottom');overEl=null;}
      }

      function onMove(e){
        if(!isDragging){isDragging=true;item.classList.add('dragging');}
        clearOver();
        var els=container.querySelectorAll('.step-item:not(.dragging)');
        els.forEach(function(el){
          var r=el.getBoundingClientRect();
          if(e.clientY>=r.top&&e.clientY<=r.bottom){
            overEl=el;
            overTop=e.clientY<(r.top+r.height/2);
            el.classList.add(overTop?'drag-over-top':'drag-over-bottom');
          }
        });
      }

      function onUp(e){
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
        item.classList.remove('dragging');
        if(isDragging&&overEl){
          var elIdx=parseInt(overEl.dataset.idx);
          var top=overEl.classList.contains('drag-over-top');
          clearOver();
          var toIdx=top?elIdx:elIdx+1;
          if(toIdx>fromIdx)toIdx--;
          if(toIdx!==fromIdx)reorderStep(sec,tid,fromIdx,toIdx);
        } else {
          clearOver();
        }
      }

      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    });
  });
}

function clearDragOver(){
  if(dragState.overEl){dragState.overEl.classList.remove('drag-over-top','drag-over-bottom');dragState.overEl=null;}
}

function reorderStep(sec,tid,fromIdx,toIdx){
  var task=data[sec].find(function(t){return t.id===tid;});
  if(!task)return;
  // Snapshot checkbox states before moving
  var oldChecks=task.steps.map(function(_,i){return isChk(sec,tid,i);});
  // Move step text
  var moved=task.steps.splice(fromIdx,1)[0];
  task.steps.splice(toIdx,0,moved);
  // Move checkbox state the same way
  var movedChk=oldChecks.splice(fromIdx,1)[0];
  oldChecks.splice(toIdx,0,movedChk);
  // Write checkbox state back
  oldChecks.forEach(function(v,i){setChk(sec,tid,i,v);});
  localStorage.removeItem(ckKey(sec,tid,task.steps.length));
  saveData();
  renderCards(sec);
  setTimeout(function(){var c=document.getElementById('card-'+sec+'-'+tid);if(c)c.classList.add('open');},10);
}

/* ── Due date (projects) ── */
function saveDueDate(sec,tid,input){
  var task=data[sec].find(function(t){return t.id===tid;});
  if(task){task.dueDate=input.value;saveData();}
  applyDueDateStyle(input);
}
function applyDueDateStyle(input){
  if(!input.value){input.classList.remove('overdue','soon');return;}
  var due=new Date(input.value+'T00:00:00');
  var now=new Date();now.setHours(0,0,0,0);
  var diff=(due-now)/(1000*60*60*24);
  input.classList.toggle('overdue',diff<0);
  input.classList.toggle('soon',diff>=0&&diff<=7);
}
// Apply due date styles on load
function applyAllDueDates(){
  document.querySelectorAll('.due-date-input').forEach(applyDueDateStyle);
}

/* ── Title editing ── */
function startTitleEdit(e, sec, tid){
  e.stopPropagation();
  var titleEl = document.getElementById('ttl-'+sec+'-'+tid);
  var shortEl = document.getElementById('tds-'+sec+'-'+tid);
  if(!titleEl) return;
  titleEl.setAttribute('contenteditable','true');
  titleEl.classList.add('editing');
  shortEl.setAttribute('contenteditable','true');
  shortEl.classList.add('editing');
  titleEl.focus();
  // Move cursor to end
  var r=document.createRange();r.selectNodeContents(titleEl);r.collapse(false);
  window.getSelection().removeAllRanges();window.getSelection().addRange(r);
}
function commitTitle(el){
  if(window.getSelection)window.getSelection().removeAllRanges();
  el.setAttribute('contenteditable','false');
  el.classList.remove('editing');
  var sec=el.dataset.sec,tid=el.dataset.tid;
  var text=el.textContent.trim()||'Untitled Task';
  var task=data[sec].find(function(t){return t.id===tid;});
  if(task){task.title=text;saveData();}
}
function handleTitleKey(e,el){
  if(e.key==='Enter'){e.preventDefault();el.blur();}
  if(e.key==='Escape'){
    var task=data[el.dataset.sec].find(function(t){return t.id===el.dataset.tid;});
    if(task)el.textContent=task.title;
    el.setAttribute('contenteditable','false');
    el.classList.remove('editing');
  }
}

/* ── Short description editing ── */
function commitShort(el){
  if(window.getSelection)window.getSelection().removeAllRanges();
  el.setAttribute('contenteditable','false');
  el.classList.remove('editing');
  var sec=el.dataset.sec,tid=el.dataset.tid;
  var text=el.textContent.trim()||'Add a short description';
  var task=data[sec].find(function(t){return t.id===tid;});
  if(task){task.short=text;saveData();}
}
function handleShortKey(e,el){
  if(e.key==='Enter'){e.preventDefault();el.blur();}
  if(e.key==='Escape'){
    var task=data[el.dataset.sec].find(function(t){return t.id===el.dataset.tid;});
    if(task)el.textContent=task.short;
    el.setAttribute('contenteditable','false');
    el.classList.remove('editing');
  }
}

/* ── Rich text toolbar ── */
var rtTarget=null,rtSavedRange=null;

function rtAttach(el){
  rtTarget=el;
  var tb=document.getElementById('rt-toolbar');
  // Position toolbar above the summary
  var rect=el.getBoundingClientRect();
  tb.style.top=(rect.top+window.scrollY-40)+'px';
  tb.style.left=rect.left+'px';
  tb.classList.add('visible');
  rtHideLink(null);
}

function rtDetach(){
  var tb=document.getElementById('rt-toolbar');
  tb.classList.remove('visible');
  rtHideLink(null);
  rtTarget=null;
}

function rtCmd(e,cmd){
  e.preventDefault();
  document.execCommand(cmd,false,null);
  if(rtTarget)rtTarget.focus();
}

function rtShowLink(e){
  e.preventDefault();
  // Save selection so we can restore it
  var sel=window.getSelection();
  if(sel.rangeCount)rtSavedRange=sel.getRangeAt(0).cloneRange();
  var wrap=document.getElementById('rt-link-wrap');
  var btns=document.getElementById('rt-toolbar').querySelectorAll('.rt-btn');
  btns.forEach(function(b){b.style.display='none';});
  document.querySelector('.rt-divider').style.display='none';
  wrap.classList.add('visible');
  setTimeout(function(){document.getElementById('rt-link-url').focus();},10);
}

function rtHideLink(e){
  if(e)e.preventDefault();
  var wrap=document.getElementById('rt-link-wrap');
  if(!wrap)return;
  wrap.classList.remove('visible');
  document.getElementById('rt-link-url').value='';
  var btns=document.getElementById('rt-toolbar').querySelectorAll('.rt-btn');
  btns.forEach(function(b){b.style.display='';});
  var div=document.querySelector('.rt-divider');
  if(div)div.style.display='';
}

function rtApplyLink(e){
  e.preventDefault();
  var url=document.getElementById('rt-link-url').value.trim();
  if(!url)return;
  if(!/^https?:\/\//i.test(url))url='https://'+url;
  // Restore saved selection
  if(rtSavedRange&&rtTarget){
    rtTarget.focus();
    var sel=window.getSelection();
    sel.removeAllRanges();
    sel.addRange(rtSavedRange);
    document.execCommand('createLink',false,url);
    // Make link open in new tab
    rtTarget.querySelectorAll('a').forEach(function(a){a.target='_blank';a.rel='noopener';});
  }
  rtHideLink(null);
  if(rtTarget)commitSummary(rtTarget);
}

function rtLinkKey(e){
  if(e.key==='Enter'){e.preventDefault();rtApplyLink(e);}
  if(e.key==='Escape'){rtHideLink(null);if(rtTarget)rtTarget.focus();}
}

// Hide toolbar when clicking outside
document.addEventListener('mousedown',function(e){
  var tb=document.getElementById('rt-toolbar');
  if(!tb)return;
  if(tb.contains(e.target))return;
  if(rtTarget&&rtTarget.contains(e.target))return;
  rtDetach();
});

/* ── Summary editing ── */
function commitSummary(el){
  var sec=el.dataset.sec,tid=el.dataset.tid;
  var html=el.innerHTML.trim()||'Add a description.';
  var task=data[sec].find(function(t){return t.id===tid;});
  if(task){task.summary=html;saveData();}
}
function handleSummaryKey(e,el){
  if(e.key==='Escape'){
    var task=data[el.dataset.sec].find(function(t){return t.id===el.dataset.tid;});
    if(task)el.innerHTML=task.summary;
    el.blur();
  }
}

/* ── Reset task steps (Freshdesk) ── */
function resetTask(sec,tid){
  var task=data[sec].find(function(t){return t.id===tid;});
  if(!task)return;
  task.steps.forEach(function(_,i){setChk(sec,tid,i,false);});
  renderCards(sec);
  setTimeout(function(){var c=document.getElementById('card-'+sec+'-'+tid);if(c)c.classList.add('open');},10);
}

/* ── Card drag & drop (task reordering) ── */
var cardDrag={sec:null,fromIdx:null,overEl:null};

function initCardDrag(container,sec){
  container.querySelectorAll('.task-card').forEach(function(card){
    var handle=card.querySelector('.card-drag-handle');
    if(!handle)return;

    // Only enable draggable when grip is held down
    handle.addEventListener('mousedown',function(){
      card.setAttribute('draggable','true');
    });
    document.addEventListener('mouseup',function(){
      card.setAttribute('draggable','false');
    });

    card.addEventListener('dragstart',function(e){
      if(card.getAttribute('draggable')!=='true'){e.preventDefault();return;}
      cardDrag.sec=sec;
      cardDrag.fromIdx=indexOfCard(sec,card.id);
      cardDrag.overEl=null;
      card.classList.add('card-dragging');
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain','');
    });

    card.addEventListener('dragend',function(){
      card.setAttribute('draggable','false');
      card.classList.remove('card-dragging');
      clearCardDragOver();
      cardDrag={sec:null,fromIdx:null,overEl:null};
    });

    card.addEventListener('dragover',function(e){
      e.preventDefault();
      if(cardDrag.fromIdx===null)return;
      var toIdx=indexOfCard(sec,card.id);
      if(toIdx===cardDrag.fromIdx)return;
      clearCardDragOver();
      cardDrag.overEl=card;
      card.classList.add(toIdx>cardDrag.fromIdx?'card-drag-over-bottom':'card-drag-over-top');
    });

    card.addEventListener('dragleave',function(e){
      // Only clear if leaving the card entirely
      if(!card.contains(e.relatedTarget))clearCardDragOver();
    });

    card.addEventListener('drop',function(e){
      e.preventDefault();
      if(cardDrag.fromIdx===null)return;
      var toIdx=indexOfCard(sec,card.id);
      if(toIdx!==cardDrag.fromIdx)reorderCard(cardDrag.sec,cardDrag.fromIdx,toIdx);
    });
  });
}

function indexOfCard(sec,cardId){
  var id=cardId.replace('card-'+sec+'-','');
  return data[sec].findIndex(function(t){return t.id===id;});
}
function clearCardDragOver(){
  if(cardDrag.overEl){cardDrag.overEl.classList.remove('card-drag-over-top','card-drag-over-bottom');cardDrag.overEl=null;}
}
function reorderCard(sec,fromIdx,toIdx){
  var moved=data[sec].splice(fromIdx,1)[0];
  data[sec].splice(toIdx,0,moved);
  renumber(sec);saveData();renderCards(sec);
}

/* ── Live date ── */
function updateDate(){
  var el=document.getElementById('live-date');if(!el)return;
  var now=new Date();
  var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  el.textContent=days[now.getDay()]+', '+months[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear();
}
updateDate();setInterval(updateDate,60000);

/* ── Reset to defaults ── */
function resetToDefaults(){
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

/* ── Tabs ── */
function switchTab(tab,e){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  e.currentTarget.classList.add('active');
  document.getElementById('section-'+tab).classList.add('active');
}

['freshdesk','ongoing','projects'].forEach(function(s){
  renderCards(s);
  initCardDrag(document.getElementById('cards-'+s),s);
});
applyAllDueDates();

    <div class="author-toggle">
      <button class="author-btn derek" id="btn-derek" onclick="setAuthor('Derek')">Derek</button>
      <button class="author-btn latif" id="btn-latif" onclick="setAuthor('Latif')">Latif</button>
    </div>
  </div>
  <div class="notes-feed" id="notes-feed"></div>
  <div class="notes-input-area">
    <textarea class="notes-textarea" id="notes-textarea" placeholder="Write a note…" onkeydown="notesKeydown(event)"></textarea>
    <button class="notes-post-btn" id="notes-post-btn" onclick="postNote()">Post</button>
  </div>
</div>

<script>
// ── Notes config ──────────────────────────────────────────
// To make notes shared between Derek & Latif:
// 1. Go to jsonbin.io, create a free account
// 2. Create a new bin with content: {"notes":[]}
// 3. Paste your Master Key and Bin ID below
var JSONBIN_KEY = ''; // e.g. '$2a$10$abc...'
var JSONBIN_ID  = ''; // e.g. '6621f3a...'
var SYNC_ENABLED = JSONBIN_KEY && JSONBIN_ID;

// ── Notes state ───────────────────────────────────────────
var notesOpen = false;
var currentAuthor = localStorage.getItem('eg_author') || 'Derek';
var notesData = [];

function loadNotes(){
  if(SYNC_ENABLED){
    fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_ID+'/latest',{
      headers:{'X-Master-Key':JSONBIN_KEY}
    }).then(function(r){return r.json();})
    .then(function(d){notesData=d.record.notes||[];renderNotes();})
    .catch(function(){loadLocalNotes();});
  } else {
    loadLocalNotes();
  }
}

function loadLocalNotes(){
  try{notesData=JSON.parse(localStorage.getItem('eg_notes')||'[]');}catch(e){notesData=[];}
  renderNotes();
}

function saveNotes(){
  localStorage.setItem('eg_notes',JSON.stringify(notesData));
  if(SYNC_ENABLED){
    fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_ID,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},
      body:JSON.stringify({notes:notesData})
    }).catch(function(){});
  }
}

// ── Author toggle ─────────────────────────────────────────
function setAuthor(name){
  currentAuthor=name;
  localStorage.setItem('eg_author',name);
  document.getElementById('btn-derek').classList.toggle('active',name==='Derek');
  document.getElementById('btn-latif').classList.toggle('active',name==='Latif');
}

// ── Toggle drawer ─────────────────────────────────────────
function toggleNotes(){
  notesOpen=!notesOpen;
  document.getElementById('notes-drawer').classList.toggle('open',notesOpen);
  document.getElementById('notes-overlay').classList.toggle('open',notesOpen);
  if(notesOpen){loadNotes();setTimeout(function(){document.getElementById('notes-textarea').focus();},300);}
}

// ── Render feed ───────────────────────────────────────────
function renderNotes(){
  var feed=document.getElementById('notes-feed');
  if(!notesData.length){
    feed.innerHTML='<div class="notes-empty"><div class="notes-empty-icon">💬</div><div class="notes-empty-text">No notes yet. Be the first to post.</div></div>';
    return;
  }
  // Newest first
  var sorted=notesData.slice().reverse();
  feed.innerHTML=sorted.map(function(n){
    var authorClass=n.author==='Derek'?'derek':'latif';
    return '<div class="note-item '+authorClass+'">'+
      '<div class="note-meta">'+
        '<span class="note-author '+authorClass+'">'+n.author+'</span>'+
        '<span class="note-time">'+n.timestamp+'</span>'+
        '<button class="note-delete" onclick="deleteNote(\''+n.id+'\')" title="Delete">'+
          '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'+
        '</button>'+
      '</div>'+
      '<div class="note-bubble">'+escNote(n.text)+'</div>'+
    '</div>';
  }).join('');
}

function escNote(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── Post note ─────────────────────────────────────────────
function postNote(){
  var ta=document.getElementById('notes-textarea');
  var text=ta.value.trim();
  if(!text)return;
  var now=new Date();
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var h=now.getHours(),m=now.getMinutes(),ampm=h>=12?'PM':'AM';
  h=h%12||12;var ms=m<10?'0'+m:m;
  var timestamp=months[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear()+' · '+h+':'+ms+' '+ampm;
  notesData.push({id:'n'+Date.now(),author:currentAuthor,text:text,timestamp:timestamp});
  saveNotes();
  renderNotes();
  ta.value='';
  ta.focus();
  // Scroll feed to top (newest first)
  var feed=document.getElementById('notes-feed');
  feed.scrollTop=0;
}

function deleteNote(id){
  notesData=notesData.filter(function(n){return n.id!==id;});
  saveNotes();renderNotes();
}

function notesKeydown(e){
  if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){postNote();}
}

// ── Init author state ─────────────────────────────────────
setAuthor(currentAuthor);
</script>
</body>
</html>
